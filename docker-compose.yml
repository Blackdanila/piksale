services:
  app:
    build: .
    container_name: piksale-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      - DATABASE_URL=postgresql://piksale:piksale@postgres:5432/piksale
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: piksale-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=piksale
      - POSTGRES_PASSWORD=piksale
      - POSTGRES_DB=piksale
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piksale"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
